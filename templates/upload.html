<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Document Keeper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav class="glass-nav">
        <h2
            style="font-weight: 600; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; color: transparent;">
            DocKeeper</h2>
        <a href="{{ url_for('dashboard', folder_id=folder_id) }}" style="color: var(--text-muted); text-decoration: none;"><i
                class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="login-box" style="margin-top: 2rem; width: 100%; max-width: 100%;">
            <h2 style="margin-bottom: 2rem;">Upload Document</h2>
            <form id="uploadForm" action="{{ url_for('upload') }}" method="POST" enctype="multipart/form-data">
                {% if folder_id %}
                <input type="hidden" name="folder_id" value="{{ folder_id }}">
                {% endif %}
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. My Vacation Video" required>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Description</label>
                    <textarea name="description" class="form-control" rows="3"
                        placeholder="Add some details about this file..."></textarea>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Select File</label>
                    <input type="file" name="file" class="form-control" required style="padding: 0.6rem;">
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">Max file size: 100MB</p>
                </div>
                <button type="submit" id="uploadBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;"><i
                        class="fas fa-cloud-upload-alt"></i> Start Upload</button>
                        
                <div id="progressContainer" style="display: none; margin-top: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem;">
                        <span id="progressText" style="color: var(--text-muted);">Uploading...</span>
                        <span id="progressPercent" style="color: var(--primary); font-weight: 600;">0%</span>
                    </div>
                    <div style="width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden;">
                        <div id="progressBar" style="width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease;"></div>
                    </div>
                </div>
            </form>
            
            <script>
                document.getElementById('uploadForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const form = this;
                    const btn = document.getElementById('uploadBtn');
                    const progressContainer = document.getElementById('progressContainer');
                    const progressBar = document.getElementById('progressBar');
                    const progressPercent = document.getElementById('progressPercent');
                    const progressText = document.getElementById('progressText');
                    
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
                    progressContainer.style.display = 'block';
                    
                    const formData = new FormData(form);
                    const xhr = new XMLHttpRequest();
                    
                    xhr.upload.addEventListener('progress', function(e) {
                        if (e.lengthComputable) {
                            const percent = Math.round((e.loaded / e.total) * 100);
                            progressBar.style.width = percent + '%';
                            progressPercent.textContent = percent + '%';
                            
                            if (percent === 100) {
                                progressText.textContent = 'Processing & Encrypting...';
                            }
                        }
                    });
                    
                    xhr.addEventListener('load', function() {
                        if (xhr.status >= 200 && xhr.status < 400) {
                            window.location.href = "{{ url_for('dashboard', folder_id=folder_id) }}";
                        } else {
                            progressText.textContent = 'Upload failed! Please try again.';
                            progressText.style.color = '#ef4444';
                            progressBar.style.background = '#ef4444';
                            btn.disabled = false;
                            btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Start Upload';
                        }
                    });
                    
                    xhr.addEventListener('error', function() {
                        progressText.textContent = 'Network error occurred!';
                        progressText.style.color = '#ef4444';
                        progressBar.style.background = '#ef4444';
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Start Upload';
                    });
                    
                    xhr.open(form.method, form.action);
                    xhr.send(formData);
                });
            </script>
        </div>
    </div>
    <footer>
        <p>&copy; All Rights Reserved 2026 - Developed by <strong>Vishal Ubale</strong></p>
    </footer>
</body>

</html>
